name: "⚡ SEO Generator — 1000 articles/jour"

on:
  schedule:
    - cron: "0 */8 * * *"     # 3 runs/jour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: "Generate articles"
        run: |
          cd seo-generator
          python generate.py 334
          python sitemap-gen.py
          cp sitemap.xml ..
          echo "Done: $(find ../seo-pages -name '*.html' | wc -l) articles"
      
      - name: "Commit & Push"
        run: |
          git config user.name "SEO Bot"
          git config user.email "bot@whatsapp-viewer.dev"
          git add seo-pages/ sitemap.xml
          git diff --staged --quiet || git commit -m "📰 $(date +%Y-%m-%d-%H) — $(find seo-pages -name '*.html' | wc -l) articles"
          git push
