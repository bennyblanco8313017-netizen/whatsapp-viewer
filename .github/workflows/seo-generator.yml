name: "⚡ SEO Generator — 1000 articles/jour"

on:
  schedule:
    - cron: "0 * * * *"       # Toutes les heures
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: "Generate articles"
        run: |
          python seo-generator/generate.py 334
          python seo-generator/sitemap-gen.py
          echo "Done: $(find seo-pages -name '*.html' 2>/dev/null | wc -l) articles"
      
      - name: "Commit & Push"
        run: |
          git config user.name "SEO Bot"
          git config user.email "bot@whatsapp-viewer.dev"
          git add seo-pages/ sitemap.xml
          git diff --staged --quiet && echo "No changes" || (git commit -m "📰 $(date +%Y-%m-%d-%H) — $(find seo-pages -name '*.html' | wc -l) articles" && git push)
